llm:
  base_url: "http://localhost:11434"
  model: "gemma4:26b"
  temperature: 0.0
  max_tokens: 8192
  num_ctx: 32768                    # Ollama context window. 하드웨어에 맞게 조절.
  enable_native_tools: false      # native tool calling 이 선호 경로이나 default 모델 이슈 (ADR-004) 로 현재는 prompt-based 기본. 다른 모델 사용 시 true 로 바꿔 enable.
  request_timeout_seconds: 120
  planner_max_tokens: 4096
  planner_timeout_seconds: 90
  code_max_tokens: 8192
  code_timeout_seconds: 120
  repair_max_tokens: 8192
  repair_timeout_seconds: 120

execution:
  max_steps: 15
  max_repair_attempts: 3

# tools_dir: "~/.adaptive-agent/tools"
