id: persistent_tool_reuse
name: "Persistent 도구 호출 후 결과 응답"
category: persistent_tool
description: "기존 persistent 도구를 호출하고, 결과를 바탕으로 즉시 텍스트 응답하는지 확인. 같은 도구를 반복 호출하지 않는지도 검증."
setup_files: []
setup_tools:
  - name: "mock_news_fetcher"
inputs:
  - "뉴스 3개 가져와줘"
ask_user_responses: []
config_overrides: {}
timeout_seconds: 120
verify:
  - type: final_success
    value: true
  - type: response_contains
    values: ["경제성장률", "AI 스타트업", "기후변화"]
split: train
