id: tool_reuse
name: "기존 도구 파라미터 변경 재사용 (multi-turn)"
category: planner_decision
description: "T1 에서 filter 도구 생성, T2 에서 같은 도구를 다른 파라미터로 재호출. 새 도구 또 만들지 말고 기존 것 재사용."
setup_files:
  - src: "monsters.json"
    dst: "monsters.json"
turns:
  - user: "monsters.json 에서 HP 가 100 이상인 몬스터를 필터링해줘"
    expect:
      - type: tool_called
        tool_name: generate_code
  - user: "이번에는 HP 가 200 이상인 몬스터를 필터링해줘"
    expect:
      - type: final_success
        value: true
config_overrides: {}
timeout_seconds: 300
verify:
  - type: final_success
    value: true
split: train
difficulty: medium
