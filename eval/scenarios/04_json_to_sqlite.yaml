id: json_to_sqlite
name: "JSON을 SQLite로 변환"
category: data_pipeline
description: "JSON 사용자 데이터를 정규화하여 SQLite 데이터베이스로 변환"
setup_files:
  - src: "users.json"
    dst: "users.json"
inputs:
  - "이 JSON 데이터를 정규화하고 users.db SQLite 데이터베이스로 변환해줘"
ask_user_responses: []
config_overrides: {}
timeout_seconds: 120
verify:
  - type: file_exists
    paths: ["users.db"]
    match: all
split: train
