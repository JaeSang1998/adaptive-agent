llm:
  base_url: "http://localhost:11434"
  model: "gemma4:26b"
  temperature: 0.0
  max_tokens: 8192
  num_ctx: 131072                   # Ollama context window. gemma4:26b 256K 활용. 권장 메모리 ≥ 48GB. 작은 메모리에서는 32768 등으로 낮춰도 됨.
  enable_native_tools: false        # gemma4:26b multi-turn empty content 이슈로 prompt-based 기본. 다른 모델/후속 버전에서 true 로 복귀.
  request_timeout_seconds: 120
  planner_max_tokens: 4096
  planner_timeout_seconds: 90
  code_max_tokens: 8192
  code_timeout_seconds: 120
  repair_max_tokens: 8192
  repair_timeout_seconds: 120

execution:
  max_steps: 15
  max_repair_attempts: 3

# tools_dir: "~/.adaptive-agent/tools"
